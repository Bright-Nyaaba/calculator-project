<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SciCalc Pro | Modern Scientific Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #0a0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', 'Poppins', monospace;
            padding: 16px;
        }

        /* Compact Calculator - normal size like traditional scientific calc */
        .calculator {
            background: rgba(18, 28, 40, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(72, 150, 220, 0.3);
            width: 100%;
            max-width: 480px;
            transition: all 0.2s;
        }

        /* Live Clock Header - compact */
        .clock-header {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1.5rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .time-box {
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }
        .live-time {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #c0e0ff, #80c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .live-date {
            font-size: 0.7rem;
            color: #9bb5d4;
        }
        .greeting {
            font-size: 0.75rem;
            background: #1e3a5f60;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            color: #bbd6ff;
        }

        /* Mode Tabs - compact */
        .mode-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 2rem;
            padding: 0.2rem;
        }
        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.45rem;
            border-radius: 1.8rem;
            font-weight: 600;
            font-size: 0.8rem;
            color: #b0caf5;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .mode-btn.active {
            background: #2c6e9e;
            color: white;
            box-shadow: 0 1px 5px #00a0ff40;
        }

        /* Display Screen */
        .display {
            background: #030b14e0;
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            margin-bottom: 1.2rem;
            box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.5);
            text-align: right;
        }
        .expression {
            color: #8db3d9;
            font-size: 0.8rem;
            min-height: 1.4rem;
            font-family: 'Courier New', monospace;
            word-break: break-word;
        }
        .result {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            min-height: 3.2rem;
            word-break: break-word;
            font-family: 'Segoe UI', monospace;
            text-shadow: 0 0 1px cyan;
        }
        .mode-hint {
            font-size: 0.65rem;
            color: #7293bb;
            margin-top: 6px;
            text-align: left;
            border-top: 1px solid #2e577a60;
            padding-top: 5px;
        }

        /* 6-Column Grid - Standard Scientific Calculator Layout */
        .buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.5rem;
        }

        .btn {
            background: #16222e;
            border: none;
            padding: 0.7rem 0;
            border-radius: 1.2rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #eef5ff;
            font-family: 'Segoe UI', monospace;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 3px 0 #070e14;
            text-align: center;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #070e14;
        }
        .btn-fn {
            background: #1d3b50;
            color: #c4e2ff;
            font-size: 0.75rem;
        }
        .btn-op {
            background: #e67e22;
            color: white;
            box-shadow: 0 3px 0 #a8540c;
            font-size: 1rem;
        }
        .btn-clear {
            background: #c04141;
            box-shadow: 0 3px 0 #752828;
        }
        .btn-equals {
            background: #2c9e6e;
            box-shadow: 0 3px 0 #1b6242;
            font-size: 1.1rem;
        }
        .btn-mem {
            background: #2f4968;
            font-size: 0.7rem;
        }

        @media (max-width: 450px) {
            .calculator { padding: 0.9rem; }
            .btn { font-size: 0.7rem; padding: 0.55rem 0; }
            .btn-fn { font-size: 0.65rem; }
            .result { font-size: 1.6rem; }
            .live-time { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="calculator">
    <!-- Live Clock + Date + Greeting (Compact) -->
    <div class="clock-header">
        <div class="time-box">
            <div class="live-time" id="liveTime">--:--:--</div>
            <div class="live-date" id="liveDate">Loading...</div>
        </div>
        <div class="greeting" id="greetingMsg">✨ Scientific</div>
    </div>

    <!-- Mode Switcher -->
    <div class="mode-tabs">
        <button class="mode-btn active" data-mode="scientific">🔬 Scientific</button>
        <button class="mode-btn" data-mode="time">⏱️ Time & Units</button>
    </div>

    <!-- Display -->
    <div class="display">
        <div class="expression" id="expressionDisplay"></div>
        <div class="result" id="resultDisplay">0</div>
        <div class="mode-hint" id="modeHint">RAD mode | sin, cos, tan, ln, log, √, π, e</div>
    </div>

    <!-- Buttons Container -->
    <div class="buttons" id="buttonsContainer"></div>
</div>

<script>
    // ======================== COMPACT SCIENTIFIC CALCULATOR with LIVE CLOCK ========================
    // Features: scientific functions, time arithmetic, unit conversion, live time/day/year
    
    // DOM Elements
    const expressionDiv = document.getElementById("expressionDisplay");
    const resultDiv = document.getElementById("resultDisplay");
    const modeHintSpan = document.getElementById("modeHint");
    const liveTimeSpan = document.getElementById("liveTime");
    const liveDateSpan = document.getElementById("liveDate");
    const greetingSpan = document.getElementById("greetingMsg");

    // State
    let currentMode = "scientific";
    let currentExpression = "";
    let memoryValue = 0;
    let lastResult = null;
    let waitingForOperand = false;
    let radianMode = true;   // true=rad, false=deg

    // ---------- LIVE CLOCK (Time, Day, Year) ----------
    function updateLiveClock() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        liveTimeSpan.innerText = `${hours}:${minutes}:${seconds}`;
        
        const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
        const formattedDate = now.toLocaleDateString(undefined, options);
        liveDateSpan.innerText = formattedDate;
        
        const hour = now.getHours();
        let greet = hour < 12 ? "🌤️ Morning" : (hour < 18 ? "☀️ Afternoon" : "🌙 Evening");
        greetingSpan.innerHTML = `${greet} · ${currentMode === "scientific" ? "Sci" : "Time"}`;
    }
    setInterval(updateLiveClock, 1000);
    updateLiveClock();

    // ======================= SCIENTIFIC ENGINE =======================
    function factorial(n) {
        if (n < 0 || Math.floor(n) !== n) throw new Error("Domain");
        if (n > 170) return Infinity;
        let f = 1;
        for (let i = 2; i <= n; i++) f *= i;
        return f;
    }
    function toRad(deg) { return deg * Math.PI / 180; }
    function toDeg(rad) { return rad * 180 / Math.PI; }

    function evaluateScientific(expr) {
        if (!expr.trim()) return "0";
        try {
            let processed = expr.replace(/\^/g, '**');
            processed = processed.replace(/π/g, 'Math.PI');
            processed = processed.replace(/(?<![a-zA-Z])e(?![a-zA-Z])/g, 'Math.E');
            
            // Trig wrappers for degree/radian
            const trigFuncs = ['sin', 'cos', 'tan', 'asin', 'acos', 'atan'];
            for (let fn of trigFuncs) {
                processed = processed.replace(new RegExp(`${fn}\\(`, 'g'), `__${fn}_trig(`);
            }
            // Standard math functions
            const stdFuncs = ['sinh', 'cosh', 'tanh', 'asinh', 'acosh', 'atanh', 'cbrt', 'sqrt', 'ln', 'log', 'exp', 'abs'];
            for (let fn of stdFuncs) {
                processed = processed.replace(new RegExp(`${fn}\\(`, 'g'), `Math.${fn}(`);
            }
            // factorial & percent
            processed = processed.replace(/(\d+(?:\.\d+)?|\))(!)/g, (m, p) => `factorial(${p === ')' ? m.slice(0,-1) : p})`);
            processed = processed.replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');
            // squares, cubes, roots
            processed = processed.replace(/sqr\(([^)]+)\)/g, 'Math.pow($1,2)');
            processed = processed.replace(/cub\(([^)]+)\)/g, 'Math.pow($1,3)');
            processed = processed.replace(/root\(([^)]+),([^)]+)\)/g, 'Math.pow($1,1/$2)');
            
            function __sin_trig(x) { return Math.sin(radianMode ? x : toRad(x)); }
            function __cos_trig(x) { return Math.cos(radianMode ? x : toRad(x)); }
            function __tan_trig(x) { return Math.tan(radianMode ? x : toRad(x)); }
            function __asin_trig(x) { return radianMode ? Math.asin(x) : toDeg(Math.asin(x)); }
            function __acos_trig(x) { return radianMode ? Math.acos(x) : toDeg(Math.acos(x)); }
            function __atan_trig(x) { return radianMode ? Math.atan(x) : toDeg(Math.atan(x)); }

            const evaluator = new Function('Math', 'factorial', 
                '__sin_trig','__cos_trig','__tan_trig','__asin_trig','__acos_trig','__atan_trig',
                'return (' + processed + ')');
            let val = evaluator(Math, factorial, __sin_trig, __cos_trig, __tan_trig, __asin_trig, __acos_trig, __atan_trig);
            if (isNaN(val) || !isFinite(val)) throw new Error("Invalid");
            if (Math.abs(val) < 1e-12) val = 0;
            return parseFloat(val.toFixed(10)).toString();
        } catch(e) { return "Error"; }
    }

    function computeScientific() {
        if (!currentExpression) return;
        let res = evaluateScientific(currentExpression);
        if (res === "Error") { resultDiv.innerText = "Error"; lastResult = null; }
        else {
            let num = parseFloat(res);
            let formatted = (Math.abs(num) > 1e10 || (Math.abs(num) < 1e-6 && num !== 0)) ? num.toExponential(8) : num.toString();
            resultDiv.innerText = formatted;
            lastResult = num;
        }
        waitingForOperand = true;
        updateDisplay();
    }

    // ======================= TIME & UNIT HELPER =======================
    function timeToSeconds(tStr) {
        let parts = tStr.split(':');
        if (parts.length === 2) parts = [parts[0], parts[1], "0"];
        if (parts.length !== 3) return NaN;
        let h = parseInt(parts[0]), m = parseInt(parts[1]), s = parseInt(parts[2]);
        if (isNaN(h) || isNaN(m) || isNaN(s)) return NaN;
        return h * 3600 + m * 60 + s;
    }
    function secondsToTime(sec) {
        let sign = sec < 0 ? "-" : "";
        sec = Math.abs(sec);
        let h = Math.floor(sec / 3600);
        let m = Math.floor((sec % 3600) / 60);
        let s = Math.floor(sec % 60);
        return `${sign}${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
    const unitTables = {
        length: { m:1, km:1000, cm:0.01, mm:0.001, mile:1609.34, ft:0.3048, inch:0.0254 },
        mass: { kg:1, g:0.001, mg:0.000001, lb:0.453592, oz:0.0283495 },
        time: { sec:1, min:60, hr:3600, day:86400 }
    };
    function convertUnits(val, fromU, toU, cat) {
        const table = unitTables[cat];
        if (!table || !(fromU in table) || !(toU in table)) return NaN;
        return (val * table[fromU]) / table[toU];
    }
    function processTimeAction(action) {
        let curVal = resultDiv.innerText;
        if (curVal === "Error") curVal = "00:00:00";
        if (action === "addTime") {
            let delta = prompt("➕ Add (HH:MM:SS):", "01:00:00");
            if (delta) { let s = timeToSeconds(delta); let cs = timeToSeconds(curVal); if (!isNaN(s) && !isNaN(cs)) resultDiv.innerText = secondsToTime(cs + s); }
        } else if (action === "subTime") {
            let delta = prompt("➖ Subtract (HH:MM:SS):", "00:30:00");
            if (delta) { let s = timeToSeconds(delta); let cs = timeToSeconds(curVal); if (!isNaN(s) && !isNaN(cs)) resultDiv.innerText = secondsToTime(cs - s); }
        } else if (action === "toSec") {
            let secs = timeToSeconds(curVal);
            if (!isNaN(secs)) resultDiv.innerText = secs + " sec";
        } else if (action === "fromSec") {
            let secs = parseFloat(prompt("Seconds:", "3665"));
            if (!isNaN(secs)) resultDiv.innerText = secondsToTime(secs);
        } else if (action === "unitConv") {
            let cat = prompt("Category (length,mass,time):", "length");
            let fromU = prompt("From (m,km,cm,mm,mile,ft,inches):", "m");
            let toU = prompt("To:", "km");
            let val = parseFloat(prompt("Value:", "1000"));
            if (cat && fromU && toU && !isNaN(val)) {
                let res = convertUnits(val, fromU, toU, cat);
                if (!isNaN(res)) resultDiv.innerText = res.toFixed(6) + ` ${toU}`;
                else resultDiv.innerText = "Error";
            }
        } else if (action === "timestamp") {
            let now = Date.now();
            resultDiv.innerText = `Unix: ${Math.floor(now/1000)}`;
        } else if (action === "tsToDate") {
            let ts = prompt("Unix timestamp (seconds):", Math.floor(Date.now()/1000));
            if (ts) { let d = new Date(parseInt(ts)*1000); resultDiv.innerText = d.toLocaleString(); }
        } else if (action === "resetTime") {
            resultDiv.innerText = "00:00:00";
            currentExpression = "";
        }
        waitingForOperand = false;
        updateDisplay();
    }

    // =============== BUTTON LAYOUT (Compact 6-column) ===============
    const scientificLayout = [
        ["MC","MR","MS","π","e","AC"],
        ["sinh","cosh","tanh","sin","cos","tan"],
        ["asin","acos","atan","ln","log","√"],
        ["x²","x³","xʸ","cbrt","n!","%"],
        ["7","8","9","/","^","C"],
        ["4","5","6","*","(",")"],
        ["1","2","3","-","deg/rad","="],
        ["0",".","+","1/x","|x|","⌫"]
    ];

    const timeLayout = [
        ["Add","Sub","→Sec","←Sec","Unit","TS"],
        ["TS→Date","Reset","00:00","12:00","23:59","C"],
        ["7","8","9","4","5","6"],
        ["1","2","3","0",":","⌫"],
        ["Set","=","Now+1h","Now-30m","",""]
    ];

    function buildButtons() {
        const layout = currentMode === "scientific" ? scientificLayout : timeLayout;
        buttonsContainer.innerHTML = "";
        for (let row of layout) {
            for (let label of row) {
                if (!label || label === "") continue;
                const btn = document.createElement("button");
                btn.className = "btn";
                if (currentMode === "scientific") {
                    if (["/","*","-","+","^"].includes(label)) btn.classList.add("btn-op");
                    else if (label === "AC" || label === "C") btn.classList.add("btn-clear");
                    else if (label === "=") btn.classList.add("btn-equals");
                    else if (["MS","MR","MC"].includes(label)) btn.classList.add("btn-mem");
                    else if (!/[0-9.]/.test(label)) btn.classList.add("btn-fn");
                } else {
                    if (label === "C" || label === "Reset") btn.classList.add("btn-clear");
                    else if (label === "=") btn.classList.add("btn-equals");
                    else if (label === "Add" || label === "Sub" || label.includes("Unit") || label.includes("TS")) btn.classList.add("btn-mem");
                    else btn.classList.add("btn-fn");
                }
                btn.innerText = label;
                btn.addEventListener("click", () => handleClick(label));
                buttonsContainer.appendChild(btn);
            }
        }
    }

    // ======================= MAIN HANDLER =======================
    function handleClick(label) {
        if (currentMode === "scientific") {
            if (label === "AC" || label === "C") { clearAll(); updateDisplay(); return; }
            if (label === "⌫") { backspace(); updateDisplay(); return; }
            if (label === "=") { computeScientific(); updateDisplay(); return; }
            if (label === "deg/rad") { radianMode = !radianMode; updateModeHint(); return; }
            if (label === "MS") { memStore(); return; }
            if (label === "MR") { memRecall(); return; }
            if (label === "MC") { memoryValue = 0; return; }
            if (label === "π") { appendConst("π"); return; }
            if (label === "e") { appendConst("e"); return; }
            if (label === "x²") { appendFunc("sqr"); return; }
            if (label === "x³") { appendFunc("cub"); return; }
            if (label === "xʸ") { appendToExpression("^", true); return; }
            if (label === "cbrt") { appendFunc("cbrt"); return; }
            if (label === "n!") { appendFact(); return; }
            if (label === "%") { appendToExpression("%", false); return; }
            if (label === "1/x") { appendToExpression("1/(", false); return; }
            if (label === "|x|") { appendFunc("abs"); return; }
            if (label === "√") { appendFunc("sqrt"); return; }
            if (label === "ln") { appendFunc("ln"); return; }
            if (label === "log") { appendFunc("log"); return; }
            if (["sin","cos","tan","asin","acos","atan","sinh","cosh","tanh"].includes(label)) {
                appendFuncWithParen(label);
                return;
            }
            // numbers, operators, parentheses
            if (/^[0-9]$/.test(label)) appendToExpression(label, false);
            else if (label === ".") appendToExpression(".", false);
            else if (label === "(") appendToExpression("(", false);
            else if (label === ")") appendToExpression(")", false);
            else if (["+","-","*","/","^"].includes(label)) appendToExpression(label, true);
        } 
        else {  // TIME MODE
            if (label === "C") { clearAll(); resultDiv.innerText = "00:00:00"; currentExpression=""; updateDisplay(); return; }
            if (label === "⌫") { backspaceTime(); return; }
            if (label === "=") { evalTimeExpr(); return; }
            if (label === "Reset") { resultDiv.innerText = "00:00:00"; return; }
            if (label === "00:00") { resultDiv.innerText = "00:00:00"; return; }
            if (label === "12:00") { resultDiv.innerText = "12:00:00"; return; }
            if (label === "23:59") { resultDiv.innerText = "23:59:59"; return; }
            if (label === "Now+1h") { let cur = timeToSeconds(resultDiv.innerText); if(!isNaN(cur)) resultDiv.innerText = secondsToTime(cur+3600); return; }
            if (label === "Now-30m") { let cur = timeToSeconds(resultDiv.innerText); if(!isNaN(cur)) resultDiv.innerText = secondsToTime(cur-1800); return; }
            if (label === "Add") { processTimeAction("addTime"); return; }
            if (label === "Sub") { processTimeAction("subTime"); return; }
            if (label === "→Sec") { processTimeAction("toSec"); return; }
            if (label === "←Sec") { processTimeAction("fromSec"); return; }
            if (label === "Unit") { processTimeAction("unitConv"); return; }
            if (label === "TS") { processTimeAction("timestamp"); return; }
            if (label === "TS→Date") { processTimeAction("tsToDate"); return; }
            if (label === "Set") { let nt = prompt("Enter time (HH:MM:SS):", resultDiv.innerText); if(nt && /^[\d:]+$/.test(nt)) resultDiv.innerText = nt; return; }
            if (/^[0-9]$/.test(label)) appendTimeDigit(label);
            if (label === ":") appendTimeDigit(":");
        }
        updateDisplay();
    }

    // Scientific helpers
    function appendConst(c) { if(waitingForOperand){ currentExpression=""; waitingForOperand=false; } currentExpression += c; updateDisplay(); }
    function appendFunc(f) { if(waitingForOperand){ currentExpression=""; waitingForOperand=false; } currentExpression += `${f}(`; updateDisplay(); }
    function appendFuncWithParen(f) { if(waitingForOperand){ currentExpression=""; waitingForOperand=false; } currentExpression += `${f}(`; updateDisplay(); }
    function appendFact() { if(waitingForOperand){ currentExpression=""; waitingForOperand=false; } currentExpression += "!"; updateDisplay(); }
    function appendToExpression(val, isOp) { if(waitingForOperand && !isOp){ currentExpression=""; waitingForOperand=false; } currentExpression += val; updateDisplay(); }
    function backspace() { currentExpression = currentExpression.slice(0,-1); updateDisplay(); if(!currentExpression) resultDiv.innerText="0"; }
    function clearAll() { currentExpression=""; resultDiv.innerText="0"; lastResult=null; waitingForOperand=false; updateDisplay(); }
    function memStore() { let v = parseFloat(resultDiv.innerText); if(!isNaN(v) && isFinite(v)) memoryValue=v; }
    function memRecall() { if(waitingForOperand){ currentExpression=""; waitingForOperand=false; } currentExpression += memoryValue; updateDisplay(); }
    function updateModeHint() { 
        if(currentMode === "scientific") modeHintSpan.innerHTML = radianMode ? "📐 RAD mode | sinh, cosh, tanh, xʸ" : "📏 DEG mode | trig in degrees";
        else modeHintSpan.innerHTML = "⏱️ Add/Sub time · Unit conversion · Timestamp";
    }
    // Time helpers
    function backspaceTime() { let txt = resultDiv.innerText; if(txt && txt !== "Error") { let nt = txt.slice(0,-1); if(nt==="") nt="00:00:00"; resultDiv.innerText = nt; } }
    function appendTimeDigit(ch) { let cur = resultDiv.innerText; if(cur === "Error" || (cur === "00:00:00" && ch !== ":")) cur = ""; let nv = cur + ch; if(/^(\d{0,2}:?\d{0,2}:?\d{0,2})$/.test(nv) || ch === ":") resultDiv.innerText = nv; }
    function evalTimeExpr() { let expr = resultDiv.innerText; if(expr.includes("+") || expr.includes("-")) { let parts = expr.split(/(?=[+-])/); let total=0; for(let p of parts){ let sec = timeToSeconds(p.trim()); if(isNaN(sec)){ resultDiv.innerText="Error"; return; } total+=sec; } resultDiv.innerText = secondsToTime(total); } }
    function updateDisplay() { expressionDiv.innerText = currentExpression || (currentMode === "time" ? "⏱️ Time ops" : ""); if(!currentExpression && currentMode !== "time" && resultDiv.innerText==="0"){} updateModeHint(); greetingSpan.innerHTML = greetingSpan.innerHTML.split("·")[0] + `· ${currentMode === "scientific" ? "Sci" : "Time"}`; }

    // Mode switching
    function setMode(mode) {
        currentMode = mode;
        currentExpression = "";
        waitingForOperand = false;
        if (mode === "scientific") resultDiv.innerText = lastResult !== null ? lastResult.toString() : "0";
        else resultDiv.innerText = "00:00:00";
        updateDisplay();
        buildButtons();
        document.querySelectorAll(".mode-btn").forEach(btn => {
            if (btn.getAttribute("data-mode") === mode) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        updateModeHint();
    }

    function init() {
        buildButtons();
        document.querySelectorAll(".mode-btn").forEach(btn => {
            btn.addEventListener("click", () => setMode(btn.getAttribute("data-mode")));
        });
        updateLiveClock();
        clearAll();
    }
    init();
</script>
</body>
</html>
